name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-label:
    name: Auto-Label New Issues
    runs-on: ubuntu-latest
    steps:
      - name: Add triage label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['triage']
            });

      - name: Add type label from template
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const labels = [];

            // Detect type from issue template or title prefix
            if (title.startsWith('bug:') || body.includes('steps to reproduce')) {
              labels.push('bug');
            } else if (title.startsWith('feat:') || body.includes('proposed solution')) {
              labels.push('enhancement');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }

      - name: Post triage notice
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Thanks for opening this issue! A maintainer will review and triage it shortly. Once approved, an AI agent will pick it up and submit a PR.\n\nSee our [issue lifecycle](.github/ISSUE_LIFECYCLE.md) for how issues are tracked.'
            });
