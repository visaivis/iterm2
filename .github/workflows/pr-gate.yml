name: PR Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  check-issue-linkage:
    name: Issue Linkage
    runs-on: ubuntu-latest
    steps:
      - name: Validate linked issue and approval
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prTitle = context.payload.pull_request.title || '';

            // Extract issue numbers from "Closes #N", "Fixes #N", "Resolves #N"
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const matches = [...prBody.matchAll(pattern), ...prTitle.matchAll(pattern)];
            const issueNumbers = [...new Set(matches.map(m => parseInt(m[1])))];

            if (issueNumbers.length === 0) {
              core.setFailed(
                'PR must link an issue using "Closes #N", "Fixes #N", or "Resolves #N" in the title or body.'
              );
              return;
            }

            core.info(`Found linked issues: ${issueNumbers.map(n => '#' + n).join(', ')}`);

            // Check each linked issue for the approved label (current or in history)
            let anyApproved = false;

            for (const issueNumber of issueNumbers) {
              // Check current labels
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });

              const currentLabels = issue.labels.map(l => l.name);
              if (currentLabels.includes('approved')) {
                core.info(`#${issueNumber} currently has the 'approved' label.`);
                anyApproved = true;
                continue;
              }

              // Check label events for historical approval
              const { data: events } = await github.rest.issues.listEvents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100,
              });

              const wasApproved = events.some(
                e => e.event === 'labeled' && e.label?.name === 'approved'
              );

              if (wasApproved) {
                core.info(`#${issueNumber} was previously approved (label was applied and removed during SDLC flow).`);
                anyApproved = true;
              } else {
                core.warning(`#${issueNumber} was never approved — the 'approved' label was never applied.`);
              }
            }

            if (!anyApproved) {
              core.setFailed(
                'None of the linked issues were approved. An issue must have the "approved" label (current or historical) before a PR can be merged.'
              );
            }
