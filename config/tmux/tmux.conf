# Modern Terminal - tmux Configuration
# Install: symlink to ~/.tmux.conf
# Requires: tmux 3.3+

# ============================================================================
# General Settings
# ============================================================================

# Remap prefix from Ctrl+b to Ctrl+a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Larger scrollback buffer
set -g history-limit 50000

# Low escape delay — fast key response while still allowing multi-byte
# escape sequences (DECRPM, etc.) to be parsed correctly. A value of 0
# causes tmux to misinterpret escape-initiated sequences as bare Esc +
# literal characters.
set -sg escape-time 10

# Enable mouse support (scroll, click pane, drag resize)
set -g mouse on

# Focus events (for vim/neovim autoread)
set -g focus-events on

# ============================================================================
# Display / True Color
# ============================================================================

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB"

# Slightly longer status messages
set -g display-time 2000
set -g display-panes-time 2000

# Refresh status bar every 5 seconds
set -g status-interval 5

# ============================================================================
# Key Bindings
# ============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes with | and - (more intuitive than % and ")
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Ctrl+hjkl (repeatable)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Vi copy mode (begin-selection only — tmux-yank handles yank/clipboard)
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

# Quick window switching
bind -r p previous-window
bind -r n next-window

# ============================================================================
# Status Bar (theme-matched)
# ============================================================================

set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#181818,fg=#d8d8d8"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#181818,bg=#7cafc2,bold] #S #[fg=#7cafc2,bg=#181818] "

# Right: date and time
set -g status-right-length 50
set -g status-right "#[fg=#585858]│ #[fg=#f7ca88]%H:%M #[fg=#585858]│ #[fg=#86c1b9]%Y-%m-%d "

# Window status
setw -g window-status-format "#[fg=#585858] #I:#W "
setw -g window-status-current-format "#[fg=#7cafc2,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#585858"
set -g pane-active-border-style "fg=#7cafc2"

# Message style
set -g message-style "bg=#282828,fg=#d8d8d8"
set -g message-command-style "bg=#282828,fg=#d8d8d8"

# Mode style (copy mode, etc.)
setw -g mode-style "bg=#585858,fg=#d8d8d8"

# ============================================================================
# iTerm2 Integration
# ============================================================================

# Passthrough is OFF — iTerm2 shell integration is not used in this config
# (iterm2-integration.zsh skips it, p10k-overlay disables shell integration
# marks). Leaving passthrough on causes iTerm2 DECRPM responses to leak
# into the wrong tmux pane as garbage escape codes.
set -g allow-passthrough off

# Set titles for iTerm2
set -g set-titles on
set -g set-titles-string '#S - #W'

# ============================================================================
# TPM - Tmux Plugin Manager
# ============================================================================

# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'     # Sensible defaults
set -g @plugin 'tmux-plugins/tmux-yank'          # System clipboard integration
set -g @plugin 'tmux-plugins/tmux-resurrect'     # Save/restore sessions

# tmux-resurrect settings
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM (must be at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
